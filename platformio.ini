[env:valtrack_v4_vts]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
upload_speed = 460800
monitor_speed = 115200
build_flags =
    -DSIM7600
    -DSIM7672
    -DVALTRACK_V4_VTS
    -DPARAMS_NORMAL
    -DPAYLOAD_NORMAL
    -DLIS3DH_ENABLED
    -DVALETRON_SYSTEMS
